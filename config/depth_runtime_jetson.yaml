profile: jetson_canonical_physical_order
camera:
  backend: V4L2
  device: auto
  preferred_device: null
  width: 2560
  height: 720
  fps: 60
  fourcc: MJPG
  warmup_frames: 120
raw_layout:
  mode: horizontal_sbs
  left_half_is_physical_left: true
  right_half_is_physical_right: true
  swap_left_right: false
  mirror_horizontal: false
  mirror_vertical: false
calibration:
  yaml: config/calibration_canonical.yaml
  maps: config/calibration_maps_canonical.npz
sgbm:
  min_disparity: 0
  num_disparities: 320
  block_size: 5
  uniqueness_ratio: 16
  speckle_window_size: 100
  speckle_range: 2
  disp12_max_diff: 1
  pre_filter_cap: 31
  mode: SGBM_3WAY
wls:
  enabled: true
  lambda: 8000.0
  sigma_color: 1.5
consistency:
  maximum_difference_px: 1.5
depth:
  minimum_mm: 200
  maximum_mm: 5000
measurement:
  window_size: 11
  minimum_valid_pixels: 30
  roi:
    x: 490
    y: 250
    width: 300
    height: 220
  temporal_window: 7
  temporal_outlier_absolute_mm: 50
  temporal_outlier_relative: 0.10
runtime:
  gui: true
  headless_supported: true
  process_latest_frame_only: true
  queue_size: 1
